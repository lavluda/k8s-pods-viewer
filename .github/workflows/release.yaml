# This workflow builds and publishes tagged releases.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5.0.1
        with:
          go-version: stable
          check-latest: true

      - name: Resolve release version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Print release version
        run: echo "Building release ${VERSION}"

      - name: Install release tooling
        run: go install github.com/google/go-licenses@latest

      - name: Generate attribution
        run: make generate

      - name: Verify generated files are committed
        run: |
          git diff --stat
          git diff-index --quiet HEAD --

      - name: Run release smoke tests
        run: make test-release

      - name: Publish artifacts with GoReleaser
        uses: goreleaser/goreleaser-action@v4
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Apply curated release notes
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOTES_FILE="docs/releases/${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            gh release edit "${VERSION}" --notes-file "${NOTES_FILE}"
          else
            echo "No curated notes found at ${NOTES_FILE}; leaving GoReleaser notes as-is"
          fi
